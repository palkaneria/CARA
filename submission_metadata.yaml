reproduce_command: "python rank.py --candidates ./candidates.jsonl --out ./submission.csv"

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "MacBook Pro"                    # Or: "AWS EC2 c5.4xlarge", "Local Linux box", etc.
  cpu_cores: 8                                  # Number of CPU cores used
  ram_gb: 16                                    # Available RAM in GB
  python_version: "3.11"                        # python --version
  os: "macOS"                                   # Or "Ubuntu 22.04 LTS", etc.
  uses_gpu_for_inference: false                 # Must be false — see compute constraints
  has_network_during_ranking: false             # Must be false — no API calls during ranking
  pre_computation_required: true                # true if you pre-compute embeddings or train models offline
  pre_computation_time_minutes: 30              # Approximate, if applicable

# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini 3.1 Pro"  # e.g. for architecture discussion, code review

ai_usage_summary: |
  Used Gemini (via Antigravity IDE) as the primary engineering assistant.
  The assistant refactored the ranker to support dynamic Job Description parsing from 
  txt/docx, dynamic reference date calculations, strict logical honeypot suppression, 
  and tie-break preventing min-max score scaling. No candidate profiles were sent over 
  network APIs during online ranking.

# ============================================================================
# Approach summary 
# ============================================================================
methodology_summary: |
  Dynamic hybrid ranking system using FAISS-based semantic embeddings combined with 
  detailed rule-based feature engineering (45+ features). Features a dynamic JD analyzer 
  that programmatically extracts candidate-aligned must-have skills, target YoE limits, 
  preferred locations, and job title keywords from any `.txt` or `.docx` job description. 
  Key innovations include a strict Multiplicative Behavioral Gating function that 
  drastically penalizes poor recruiter responsiveness/activity, and an aggressive 
  honeypot detection pipeline. Score normalization uses dynamic min-max scaling to 
  guarantee perfectly monotonic, unique scores for the top 100. Runtime is ~3.5 seconds.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        
  code_is_original_work: true       
  no_collusion: true                
  honeypot_check_done: true         
  reproduction_tested: true         
